name: Send HF Daily Papers to Slack

on:
  schedule:
    # 10:00 AM AEST (UTC+10) = 00:00 UTC
    # 10:00 AM AEDT (UTC+11) = 23:00 UTC previous day
    # Using AEST — adjust to "0 23 * * *" during daylight saving
    - cron: "0 0 * * *"

  workflow_dispatch:

jobs:
  send-papers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send papers to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_ID: ${{ secrets.SLACK_USER_ID }}
        run: python send_papers.py
